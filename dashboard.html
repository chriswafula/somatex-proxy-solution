<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Somatex Proxy Solution</title>
    <style>
        /* Shared CSS Variables */
        :root {
            --bg-base: #101623;
            --bg-surface: #1a2235;
            --bg-surface-light: #252f44;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #0ea5e9;
            --accent-hover: #0284c7;
            --border-color: #2e3b52;
            --success-green: #10b981;
            --radius: 12px;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo-icon { color: var(--accent-blue); }

        .nav-menu { padding: 1.5rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.3s ease; }
        .nav-link:hover, .nav-link.active { background-color: var(--bg-surface-light); color: var(--text-primary); }
        .nav-link.active { border-left: 3px solid var(--accent-blue); border-radius: 0 8px 8px 0; }

        .sidebar-footer { padding: 1.5rem 1rem; border-top: 1px solid var(--border-color); }

        /* --- Main Content Area --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 2rem 3rem; }

        /* KPI Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 1.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; margin: 0.5rem 0; }

        /* Proxy Credentials Table */
        .table-section { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { color: var(--text-secondary); font-size: 0.85rem; text-align: left; padding: 1rem; border-bottom: 1px solid var(--border-color); }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo"><span class="logo-icon">🌐</span> Somatex</a>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-link active">📊 Dashboard</a>
            <a href="#" class="nav-link">🗄️ Proxy Network</a>
            <a href="#" class="nav-link">🔑 API</a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-link" style="color: #ef4444;">🚪 Log Out</a>
        </div>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2rem;">
            <h1>Dashboard</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Data Usage</p>
                <div class="stat-value">34.2 / 50 GB</div>
            </div>
            <div class="stat-card">
                <p>Active Proxies</p>
                <div class="stat-value">145</div>
            </div>
        </div>

        <section class="table-section">
            <h2>Recent Proxy Endpoints</h2>
            <table>
                <thead>
                    <tr><th>Location</th><th>Type</th><th>IP Address</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr><td>🇺🇸 US</td><td>Datacenter</td><td>192.168.1.104</td><td>Active</td></tr>
                    <tr><td>🇩🇪 Germany</td><td>Residential</td><td>45.22.109.11</td><td>Active</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
